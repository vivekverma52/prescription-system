version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: prescription_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - prescription_net

  mongodb:
    image: mongo:6.0
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - prescription_net

  gateway:
    build: ./gateway
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - JWT_SECRET=your-jwt-secret
      - AUTH_SERVICE_HOST=auth-service
      - AUTH_SERVICE_PORT=3001
      - ORG_SERVICE_HOST=org-service
      - ORG_SERVICE_PORT=3002
      - ROLE_SERVICE_HOST=role-service
      - ROLE_SERVICE_PORT=3003
      - PRESCRIPTION_SERVICE_HOST=prescription-service
      - PRESCRIPTION_SERVICE_PORT=3004
      - MEDICINE_SERVICE_HOST=medicine-service
      - MEDICINE_SERVICE_PORT=3005
      - MEDICINE_LIB_SERVICE_HOST=medicine-lib-service
      - MEDICINE_LIB_SERVICE_PORT=3006
      - SUPERADMIN_SERVICE_HOST=superadmin-service
      - SUPERADMIN_SERVICE_PORT=3007
      - FILE_SERVICE_HOST=file-service
      - FILE_SERVICE_PORT=3008
    depends_on:
      - auth-service
    networks:
      - prescription_net

  auth-service:
    build: ./services/auth-service
    environment:
      - NODE_ENV=development
      - TCP_PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=prescription_db
      - JWT_SECRET=your-jwt-secret
      - JWT_EXPIRES_IN=15m
      - REFRESH_TOKEN_EXPIRES_IN=7d
    depends_on:
      - mysql
    networks:
      - prescription_net

  org-service:
    build: ./services/org-service
    environment:
      - NODE_ENV=development
      - TCP_PORT=3002
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=prescription_db
    depends_on:
      - mysql
    networks:
      - prescription_net

  role-service:
    build: ./services/role-service
    environment:
      - NODE_ENV=development
      - TCP_PORT=3003
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=prescription_db
    depends_on:
      - mysql
    networks:
      - prescription_net

  prescription-service:
    build: ./services/prescription-service
    environment:
      - NODE_ENV=development
      - TCP_PORT=3004
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=prescription_db
    depends_on:
      - mysql
    networks:
      - prescription_net

  medicine-service:
    build: ./services/medicine-service
    environment:
      - NODE_ENV=development
      - TCP_PORT=3005
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=prescription_db
    depends_on:
      - mysql
    networks:
      - prescription_net

  medicine-lib-service:
    build: ./services/medicine-lib-service
    environment:
      - NODE_ENV=development
      - TCP_PORT=3006
      - MONGODB_URI=mongodb://mongodb:27017/prescription_db
    depends_on:
      - mongodb
    networks:
      - prescription_net

  superadmin-service:
    build: ./services/superadmin-service
    environment:
      - NODE_ENV=development
      - TCP_PORT=3007
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=prescription_db
    depends_on:
      - mysql
    networks:
      - prescription_net

  file-service:
    build: ./services/file-service
    environment:
      - NODE_ENV=development
      - TCP_PORT=3008
      - AWS_REGION=ap-south-1
      - AWS_ACCESS_KEY_ID=
      - AWS_SECRET_ACCESS_KEY=
      - AWS_S3_BUCKET=
    networks:
      - prescription_net

volumes:
  mysql_data:
  mongo_data:

networks:
  prescription_net:
    driver: bridge
